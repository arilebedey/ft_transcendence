services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  db:
    image: postgres:15-alpine
    container_name: dev_ftt_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pgadmin:
    image: dpage/pgadmin4
    container_name: dev_ftt_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8085:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: dev_ftt_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # One-shot: creates the MinIO bucket then exits.
  minio-init:
    image: minio/mc
    container_name: dev_ftt_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}; mc mb --ignore-existing myminio/profile-pictures; mc anonymous set download myminio/profile-pictures; echo 'Bucket profile-pictures created and set to public-read'; "
    restart: "no"

  # ── One-shot migration ──────────────────────────────────────────────────────
  # Runs drizzle-kit migrate inside Docker so no local Node.js is needed.
  # backend depends on this completing successfully before it starts.

  migrate:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.dev
    image: ft_transcendence-backend:migrate
    working_dir: /app
    command: >
      /bin/sh -c " npx drizzle-kit migrate "
    environment:
      NODE_ENV: ${NODE_ENV}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    volumes:
      - ./server:/app
      - backend-node-modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Application ─────────────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.dev
    image: ft_transcendence-backend:dev
    working_dir: /app
    command: >
      /bin/sh -c " npm run dev "
    environment:
      NODE_ENV: ${NODE_ENV}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      CLIENT_URL: ${CLIENT_URL}
      CHOKIDAR_USEPOLLING: "true"
      LOGSTASH_HOST: ${LOGSTASH_HOST:-}
      LOGSTASH_PORT: ${LOGSTASH_PORT}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - backend-node-modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/auth/get-session || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.dev
    image: ft_transcendence-frontend:dev
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      NODE_ENV: ${NODE_ENV}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET}
      VITE_STORAGE_PROXY_TARGET: ${VITE_STORAGE_PROXY_TARGET}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
        restart: true
    restart: on-failure

volumes:
  dev-db-data:
  minio-data:
  backend-node-modules:
  frontend-node-modules:



