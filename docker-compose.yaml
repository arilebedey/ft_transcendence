services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  db:
    image: postgres:15-alpine
    container_name: dev_ftt_postgres
    environment:
      POSTGRES_DB: dev_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "5432:5432"
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    secrets:
      - db_password
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "dev_user", "-d", "dev_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pgadmin:
    image: dpage/pgadmin4
    container_name: dev_ftt_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/pgadmin_password
    ports:
      - "8085:80"
    secrets:
      - pgadmin_password
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: dev_ftt_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    secrets:
      - minio_password
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # One-shot: creates the MinIO bucket then exits.
  minio-init:
    image: minio/mc
    container_name: dev_ftt_minio_init
    depends_on:
      minio:
        condition: service_healthy
    secrets:
      - minio_password
    entrypoint: >
      /bin/sh -c " MINIO_PASSWORD=$$(cat /run/secrets/minio_password); mc alias set myminio http://minio:9000 minioadmin $$MINIO_PASSWORD; mc mb --ignore-existing myminio/profile-pictures; mc anonymous set download myminio/profile-pictures; echo 'Bucket profile-pictures created and set to public-read'; "
    restart: "no"

  # ── One-shot migration ──────────────────────────────────────────────────────
  # Runs drizzle-kit migrate inside Docker so no local Node.js is needed.
  # backend depends on this completing successfully before it starts.

  migrate:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.dev
    image: ft_transcendence-backend:dev
    working_dir: /app
    command: >
      /bin/sh -c " export BETTER_AUTH_SECRET=$$(cat /run/secrets/better_auth_secret); export POSTGRES_PASSWORD=$$(cat /run/secrets/db_password); npx drizzle-kit migrate "
    environment:
      NODE_ENV: development
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: dev_user
      POSTGRES_DB: dev_db
    secrets:
      - db_password
      - better_auth_secret
    volumes:
      - ./server:/app
      # Named volume prevents the bind-mount from shadowing the image's node_modules
      - backend-node-modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Application ─────────────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.dev
    image: ft_transcendence-backend:dev
    working_dir: /app
    command: >
      /bin/sh -c " export BETTER_AUTH_SECRET=$$(cat /run/secrets/better_auth_secret); export POSTGRES_PASSWORD=$$(cat /run/secrets/db_password); export MINIO_SECRET_KEY=$$(cat /run/secrets/minio_password); npm run dev "
    environment:
      NODE_ENV: development
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: dev_user
      POSTGRES_DB: dev_db
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      BETTER_AUTH_URL: http://localhost:3000
      CLIENT_URL: http://localhost:5173
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - backend-node-modules:/app/node_modules
    secrets:
      - better_auth_secret
      - db_password
      - minio_password
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/auth/get-session || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.dev
    image: ft_transcendence-frontend:dev
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      NODE_ENV: development
      VITE_API_PROXY_TARGET: http://backend:3000
      VITE_STORAGE_PROXY_TARGET: http://minio:9000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
        restart: true
    restart: on-failure

volumes:
  dev-db-data:
  minio-data: # Named volumes preserve image-installed node_modules under the source bind-mounts

  backend-node-modules:
  frontend-node-modules:


secrets:
  better_auth_secret:
    file: ./secrets/better_auth_secret.txt
  db_password:
    file: ./secrets/db_password.txt
  pgadmin_password:
    file: ./secrets/pgadmin_password.txt
  minio_password:
    file: ./secrets/minio_password.txt
