services:

  # ── One-shot: generate self-signed TLS cert for Kibana ─────────────────────
  generate-certs:
    image: alpine:3.19
    container_name: ftt_elk_certs
    command:
      - /bin/sh
      - -c
      - |
        if [ ! -f /certs/kibana.crt ]; then
          apk add --no-cache openssl > /dev/null 2>&1
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /certs/kibana.key \
            -out /certs/kibana.crt \
            -days 3650 \
            -subj '/CN=localhost/O=ft_transcendence'
          chmod 644 /certs/kibana.crt /certs/kibana.key
          echo 'TLS certificates generated.'
        else
          echo 'TLS certificates already exist.'
        fi
    volumes:
      - kibana-certs:/certs
    restart: "no"

  # ── One-shot: create MinIO bucket for snapshot archive ─────────────────────
  minio-init-elk:
    image: minio/mc
    container_name: ftt_minio_init_elk
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
        mc mb --ignore-existing myminio/elk-snapshots;
        echo 'ELK snapshot bucket ready.';
      "
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: ftt_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - "cluster.name=ft_transcendence"
      - "path.repo=/snapshots"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - elk-snapshots-fs:/snapshots
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf -u elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── One-shot: configure kibana_system + ILM + SLM ──────────────────────────
  setup-elk:
    image: curlimages/curl:8.7.1
    container_name: ftt_elk_setup
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    volumes:
      - ./docker/elk/setup-es.sh:/setup-es.sh:ro
    command: [ "/bin/sh", "/setup-es.sh" ]
    restart: "no"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: ftt_logstash
    volumes:
      - ./docker/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - "LOG_LEVEL=info"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5101:5101/tcp" # TCP – used by the NestJS CustomLogger
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9600/_node/stats | grep -q 'green'" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: ftt_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - SERVER_NAME=ft_transcendence_kibana
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_CERTIFICATE=/etc/kibana/certs/kibana.crt
      - SERVER_SSL_KEY=/etc/kibana/certs/kibana.key
    ports:
      - "127.0.0.1:5601:5601"
    volumes:
      - kibana-certs:/etc/kibana/certs:ro
    depends_on:
      setup-elk:
        condition: service_completed_successfully
      generate-certs:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf -k https://localhost:5601/api/status | grep -q 'available'" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Daily archiver: sync ES snapshots volume → MinIO ───────────────────────
  elk-archiver:
    image: minio/mc
    container_name: ftt_elk_archiver
    depends_on:
      setup-elk:
        condition: service_completed_successfully
      minio-init-elk:
        condition: service_completed_successfully
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}
        echo "Archiver started. Syncing every 24h."
        while true; do
          echo "[archiver] $(date) - syncing snapshots to MinIO..."
          mc mirror --overwrite /snapshots myminio/elk-snapshots
          echo "[archiver] Sync complete. Sleeping 24h."
          sleep 86400
        done
    volumes:
      - elk-snapshots-fs:/snapshots:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  elasticsearch-data:
  kibana-certs:
  elk-snapshots-fs:
