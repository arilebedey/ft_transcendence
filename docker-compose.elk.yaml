# ── ELK Stack ────────────────────────────────────────────────────────────────
# Usage:
#   make dev-elk        (start dev stack + ELK)
#   make prod-elk       (start prod stack + ELK)
#   make down-elk       (stop ELK only)
#
# Security: xpack enabled + Kibana HTTPS (self-signed cert).
# Kibana login → https://localhost:5601 (user: elastic / $ELASTIC_PASSWORD)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── One-shot: generate self-signed TLS cert for Kibana ─────────────────────
  generate-certs:
    image: alpine:3.19
    container_name: ftt_elk_certs
    command:
      - /bin/sh
      - -c
      - |
        if [ ! -f /certs/kibana.crt ]; then
          apk add --no-cache openssl > /dev/null 2>&1
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /certs/kibana.key \
            -out /certs/kibana.crt \
            -days 3650 \
            -subj '/CN=localhost/O=ft_transcendence'
          chmod 644 /certs/kibana.crt /certs/kibana.key
          echo 'TLS certificates generated.'
        else
          echo 'TLS certificates already exist.'
        fi
    volumes:
      - kibana-certs:/certs
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: ftt_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - "cluster.name=ft_transcendence"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf -u elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── One-shot: set kibana_system password so Kibana can connect to ES ───────
  setup-elk-users:
    image: curlimages/curl:8.7.1
    container_name: ftt_elk_setup_users
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    command:
      - /bin/sh
      - -c
      - |
        echo "Setting kibana_system password..."
        curl -sf -u "elastic:$$ELASTIC_PASSWORD" \
          -X POST "http://elasticsearch:9200/_security/user/kibana_system/_password" \
          -H "Content-Type: application/json" \
          -d "{\"password\": \"$$ELASTIC_PASSWORD\"}"
        echo ""
        echo "kibana_system password configured."
    restart: "no"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: ftt_logstash
    volumes:
      - ./docker/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - "LOG_LEVEL=info"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5101:5101/tcp" # TCP – used by the NestJS CustomLogger
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9600/_node/stats | grep -q 'green'" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: ftt_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - SERVER_NAME=ft_transcendence_kibana
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_CERTIFICATE=/etc/kibana/certs/kibana.crt
      - SERVER_SSL_KEY=/etc/kibana/certs/kibana.key
    ports:
      - "127.0.0.1:5601:5601"
    volumes:
      - kibana-certs:/etc/kibana/certs:ro
    depends_on:
      setup-elk-users:
        condition: service_completed_successfully
      generate-certs:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf -k https://localhost:5601/api/status | grep -q 'available'" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  elasticsearch-data:
  kibana-certs:
