input {
  # CustomLogger sends newline-delimited JSON over TCP
  tcp {
    port => 5101
    codec => json_lines
  }
}

filter {
  # If the "timestamp" field is present (sent by CustomLogger),
  # use it as the canonical event date
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Normalize log level to lowercase for Kibana dashboards
  if [level] {
    mutate {
      lowercase => ["level"]
    }
  }

  # Tag all events for easy filtering in Kibana
  mutate {
    add_tag => ["nestjs", "ft_transcendence"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "ft_transcendence-logs-%{+YYYY.MM.dd}"
  }

  # stdout for local debugging in Logstash logs
  stdout {
    codec => rubydebug
  }
}
